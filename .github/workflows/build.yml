name: Build and Release Plugin

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.ExternalRatings.csproj

      - name: Build and publish
        run: dotnet publish Jellyfin.Plugin.ExternalRatings.csproj -c Release -o ./dist

      - name: Create release zip
        run: |
          cd dist
          zip -j ../Jellyfin.Plugin.ExternalRatings_${{ github.event.release.tag_name }}.zip Jellyfin.Plugin.ExternalRatings.dll

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.ExternalRatings_${{ github.event.release.tag_name }}.zip
