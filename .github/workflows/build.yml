name: Build and Release Plugin
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.ExternalRatings.csproj
      - name: Build and publish
        run: dotnet publish Jellyfin.Plugin.ExternalRatings.csproj -c Release -o ./dist
      - name: Create release zip
        run: cd dist && zip -j ../Jellyfin.Plugin.ExternalRatings_${{ github.event.release.tag_name }}.zip Jellyfin.Plugin.ExternalRatings.dll
      - name: Compute checksum and update manifest
        run: |
          CHECKSUM=$(md5sum Jellyfin.Plugin.ExternalRatings_${{ github.event.release.tag_name }}.zip | awk '{print toupper($1)}')
          TAG=${{ github.event.release.tag_name }}
          sed -i "s|\"checksum\":.*|\"checksum\": \"$CHECKSUM\",|" manifest.json
          sed -i "s|releases/download/.*/Jellyfin|releases/download/$TAG/Jellyfin|" manifest.json
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifest.json
          git commit -m "Update manifest checksum for $TAG"
          git push origin HEAD:refs/heads/main
      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.ExternalRatings_${{ github.event.release.tag_name }}.zip
