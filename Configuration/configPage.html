<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>External Ratings</title>
    <style>
        .er-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            cursor: pointer;
        }

        .er-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00a4dc;
            flex-shrink: 0;
        }

        .er-link {
            color: var(--theme-primary-color, #00a4dc);
            text-decoration: none;
        }

        .er-link:hover {
            text-decoration: underline;
        }

        #erStatus {
            display: none;
            padding: 9px 13px;
            border-radius: 4px;
            margin: 8px 0 12px;
            font-weight: 500;
            font-size: 0.9em;
        }

        #erStatus.ok {
            display: block;
            background: rgba(0, 200, 80, 0.15);
            color: #00c850;
        }

        #erStatus.err {
            display: block;
            background: rgba(255, 60, 60, 0.15);
            color: #ff5050;
        }

        .er-muted {
            color: var(--text-color-secondary);
            font-size: 0.9em;
        }

        .er-actions {
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div id="ExternalRatingsConfigPage"
         data-role="page"
         class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button,emby-select">

        <div data-role="content">
            <div class="content-primary">

                <div class="sectionTitleContainer flex align-items-center">
                    <h2 class="sectionTitle">External Ratings</h2>
                </div>

                <p style="color: var(--text-color-secondary);">
                    Shows Letterboxd ratings for movies and IMDB ratings for TV shows directly in Jellyfin.
                </p>

                <div class="verticalSection">
                    <h3 class="sectionTitle">🎬 Letterboxd (Movies)</h3>

                    <label class="er-row" for="chkEnableLetterboxd">
                        <input type="checkbox" id="chkEnableLetterboxd" />
                        <span>Enable Letterboxd ratings for movies</span>
                    </label>

                    <p class="er-muted">
                        Fetched from Letterboxd, no API key needed. Uses a 5 star scale.
                    </p>
                </div>

                <div class="verticalSection">
                    <h3 class="sectionTitle">📺 IMDB (TV Shows)</h3>

                    <label class="er-row" for="chkEnableImdb">
                        <input type="checkbox" id="chkEnableImdb" />
                        <span>Enable IMDB ratings for TV shows</span>
                    </label>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="txtOmdbApiKey">OMDB API Key</label>
                        <input is="emby-input"
                               type="password"
                               id="txtOmdbApiKey"
                               class="emby-input"
                               autocomplete="off"
                               placeholder="Get a free key at omdbapi.com/apikey.aspx" />
                    </div>

                    <p class="er-muted">
                        <a class="er-link" href="https://www.omdbapi.com/apikey.aspx" target="_blank" rel="noopener">Get a free OMDB key here</a>
                        (1,000 requests per day).
                    </p>
                </div>

                <div class="verticalSection">
                    <h3 class="sectionTitle">🎨 Display</h3>

                    <label class="er-row" for="chkShowBadge">
                        <input type="checkbox" id="chkShowBadge" />
                        <span>Show rating badge on item detail pages</span>
                    </label>

                    <label class="er-row" for="chkShowOnCards">
                        <input type="checkbox" id="chkShowOnCards" />
                        <span>Show rating on poster cards (experimental)</span>
                    </label>
                </div>

                <div class="verticalSection">
                    <h3 class="sectionTitle">⚡ Cache</h3>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="numCacheDuration">Cache duration (hours)</label>
                        <input is="emby-input"
                               type="number"
                               id="numCacheDuration"
                               class="emby-input"
                               min="1"
                               max="720"
                               step="1" />
                    </div>

                    <button is="emby-button"
                            type="button"
                            id="btnClearCache"
                            class="raised button-cancel">
                        <span>Clear Rating Cache</span>
                    </button>
                </div>

                <div id="erStatus"></div>

                <div class="er-actions">
                    <button is="emby-button"
                            type="button"
                            id="btnSave"
                            class="raised button-submit block">
                        <span>Save Settings</span>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script type="text/javascript">
        (function () {
            'use strict';

            var PLUGIN_ID = 'a1b2c3d4-e5f6-7890-abcd-ef1234567890';
            var statusTimer = null;
            var isLoading = false;
            var isSaving = false;

            function el(id) {
                return document.getElementById(id);
            }

            function showStatus(message, isError) {
                var status = el('erStatus');
                if (!status) {
                    return;
                }

                status.textContent = message;
                status.className = isError ? 'err' : 'ok';

                if (statusTimer) {
                    clearTimeout(statusTimer);
                }

                statusTimer = setTimeout(function () {
                    status.className = '';
                    status.textContent = '';
                }, 5000);
            }

            function setBusyState(loading, saving) {
                isLoading = !!loading;
                isSaving = !!saving;

                var saveBtn = el('btnSave');
                var clearBtn = el('btnClearCache');

                if (saveBtn) {
                    saveBtn.disabled = isLoading || isSaving;
                }

                if (clearBtn) {
                    clearBtn.disabled = isLoading || isSaving;
                }
            }

            function normaliseConfig(config) {
                config = config || {};

                return {
                    EnableLetterboxdRatings: config.EnableLetterboxdRatings !== false,
                    EnableImdbTvRatings: config.EnableImdbTvRatings !== false,
                    ShowRatingBadge: config.ShowRatingBadge !== false,
                    ShowRatingOnCards: config.ShowRatingOnCards === true,
                    CacheDurationHours: parseInt(config.CacheDurationHours, 10) || 24,
                    OmdbApiKey: config.OmdbApiKey || ''
                };
            }

            function populateForm(config) {
                var safeConfig = normaliseConfig(config);

                el('chkEnableLetterboxd').checked = safeConfig.EnableLetterboxdRatings;
                el('chkEnableImdb').checked = safeConfig.EnableImdbTvRatings;
                el('chkShowBadge').checked = safeConfig.ShowRatingBadge;
                el('chkShowOnCards').checked = safeConfig.ShowRatingOnCards;
                el('numCacheDuration').value = safeConfig.CacheDurationHours;
                el('txtOmdbApiKey').value = safeConfig.OmdbApiKey;

                console.log('[ExternalRatings] Form populated:', safeConfig);
            }

            function readFormIntoConfig(config) {
                config = config || {};

                config.EnableLetterboxdRatings = !!el('chkEnableLetterboxd').checked;
                config.EnableImdbTvRatings = !!el('chkEnableImdb').checked;
                config.ShowRatingBadge = !!el('chkShowBadge').checked;
                config.ShowRatingOnCards = !!el('chkShowOnCards').checked;

                var cacheDuration = parseInt(el('numCacheDuration').value, 10);
                if (!cacheDuration || cacheDuration < 1) {
                    cacheDuration = 24;
                }
                if (cacheDuration > 720) {
                    cacheDuration = 720;
                }

                config.CacheDurationHours = cacheDuration;
                config.OmdbApiKey = (el('txtOmdbApiKey').value || '').trim();

                return config;
            }

            function loadConfig() {
                if (isLoading) {
                    return Promise.resolve();
                }

                setBusyState(true, false);
                console.log('[ExternalRatings] Loading configuration...');

                return ApiClient.getPluginConfiguration(PLUGIN_ID)
                    .then(function (config) {
                        populateForm(config);
                    })
                    .catch(function (error) {
                        console.error('[ExternalRatings] Failed to load configuration:', error);
                        showStatus('Failed to load settings.', true);
                    })
                    .finally(function () {
                        setBusyState(false, false);
                    });
            }

            function saveConfig() {
                if (isSaving) {
                    return;
                }

                setBusyState(false, true);
                console.log('[ExternalRatings] Saving configuration...');

                return ApiClient.getPluginConfiguration(PLUGIN_ID)
                    .then(function (config) {
                        var updatedConfig = readFormIntoConfig(config);
                        console.log('[ExternalRatings] Updated config:', updatedConfig);
                        return ApiClient.updatePluginConfiguration(PLUGIN_ID, updatedConfig);
                    })
                    .then(function (result) {
                        if (typeof Dashboard !== 'undefined' && Dashboard.processPluginConfigurationUpdateResult) {
                            Dashboard.processPluginConfigurationUpdateResult(result);
                        }

                        showStatus('Settings saved successfully.', false);

                        return ApiClient.getPluginConfiguration(PLUGIN_ID);
                    })
                    .then(function (freshConfig) {
                        populateForm(freshConfig);
                    })
                    .catch(function (error) {
                        console.error('[ExternalRatings] Failed to save configuration:', error);
                        showStatus('Save failed.', true);
                    })
                    .finally(function () {
                        setBusyState(false, false);
                    });
            }

            function clearCache() {
                if (isLoading || isSaving) {
                    return;
                }

                if (!window.confirm('Clear all cached ratings?')) {
                    return;
                }

                setBusyState(false, true);
                console.log('[ExternalRatings] Clearing cache...');

                return ApiClient.ajax({
                    type: 'DELETE',
                    url: ApiClient.getUrl('ExternalRatings/cache')
                })
                    .then(function () {
                        showStatus('Cache cleared.', false);
                    })
                    .catch(function (error) {
                        console.error('[ExternalRatings] Failed to clear cache:', error);
                        showStatus('Failed to clear cache.', true);
                    })
                    .finally(function () {
                        setBusyState(false, false);
                    });
            }

            function bindEvents() {
                var saveBtn = el('btnSave');
                var clearBtn = el('btnClearCache');
                var page = el('ExternalRatingsConfigPage');

                if (saveBtn) {
                    saveBtn.addEventListener('click', saveConfig);
                }

                if (clearBtn) {
                    clearBtn.addEventListener('click', clearCache);
                }

                if (page) {
                    page.addEventListener('pageshow', function () {
                        loadConfig();
                    });
                }
            }

            function init() {
                bindEvents();
                loadConfig();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
