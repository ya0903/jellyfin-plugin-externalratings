<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>External Ratings</title>
    <style>
        .er-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            cursor: pointer;
        }
        .er-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00a4dc;
            flex-shrink: 0;
        }
        #erStatus {
            display: none;
            padding: 9px 13px;
            border-radius: 4px;
            margin: 8px 0 12px;
            font-weight: 500;
            font-size: 0.9em;
        }
        #erStatus.ok  { display: block; background: rgba(0,200,80,0.15);  color: #00c850; }
        #erStatus.err { display: block; background: rgba(255,60,60,0.15); color: #ff5050; }
    </style>
</head>
<body>
    <div id="ExternalRatingsConfigPage"
         data-role="page"
         class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button,emby-select">

        <div data-role="content">
            <div class="content-primary">

                <div class="sectionTitleContainer flex align-items-center">
                    <h2 class="sectionTitle">External Ratings</h2>
                </div>
                <p style="color: var(--text-color-secondary);">
                    Shows Letterboxd ratings for movies and IMDB ratings for TV shows directly in Jellyfin.
                </p>

                <div class="verticalSection">
                    <h3 class="sectionTitle">🎬 Letterboxd (Movies)</h3>
                    <label class="er-row">
                        <input type="checkbox" id="chkEnableLetterboxd" />
                        <span>Enable Letterboxd ratings for movies</span>
                    </label>
                    <p style="color: var(--text-color-secondary); font-size: 0.9em;">
                        Fetched from letterboxd.com — no API key needed. 5-star scale.
                    </p>
                </div>

                <div class="verticalSection">
                    <h3 class="sectionTitle">📺 IMDB (TV Shows)</h3>
                    <label class="er-row">
                        <input type="checkbox" id="chkEnableImdb" />
                        <span>Enable IMDB ratings for TV shows</span>
                    </label>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="txtOmdbApiKey">OMDB API Key</label>
                        <input is="emby-input" type="password" id="txtOmdbApiKey" class="emby-input"
                               autocomplete="off" placeholder="Get a free key at omdbapi.com/apikey.aspx" />
                    </div>
                    <p style="color: var(--text-color-secondary); font-size: 0.9em;">
                        <a href="https://www.omdbapi.com/apikey.aspx" target="_blank" rel="noopener">Get a free OMDB key here</a> (1,000 requests/day).
                    </p>
                </div>

                <div class="verticalSection">
                    <h3 class="sectionTitle">🎨 Display</h3>
                    <label class="er-row">
                        <input type="checkbox" id="chkShowBadge" />
                        <span>Show rating badge on item detail pages</span>
                    </label>
                    <label class="er-row">
                        <input type="checkbox" id="chkShowOnCards" />
                        <span>Show rating on poster cards (experimental)</span>
                    </label>
                </div>

                <div class="verticalSection">
                    <h3 class="sectionTitle">⚡ Cache</h3>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="numCacheDuration">Cache duration (hours)</label>
                        <input is="emby-input" type="number" id="numCacheDuration" class="emby-input" min="1" max="720" />
                    </div>
                    <button is="emby-button" type="button" id="btnClearCache" class="raised button-cancel">
                        <span>Clear Rating Cache</span>
                    </button>
                </div>

                <div id="erStatus"></div>

                <div>
                    <button is="emby-button" type="button" id="btnSave" class="raised button-submit block">
                        <span>Save Settings</span>
                    </button>
                </div>

            </div>
        </div>
    </div>

<script type="text/javascript">
(function () {

    var PLUGIN_ID = 'a1b2c3d4-e5f6-7890-abcd-ef1234567890';
    var _statusTimer = null;

    // ── Status bar ──────────────────────────────────────────────────
    function showStatus(msg, isErr) {
        var el = document.getElementById('erStatus');
        el.textContent = msg;
        el.className = isErr ? 'err' : 'ok';
        if (_statusTimer) clearTimeout(_statusTimer);
        _statusTimer = setTimeout(function () { el.className = ''; }, 5000);
    }

    // ── Auth — exactly what the original working code used ──────────
    function authHeader() {
        return 'MediaBrowser Token="' + ApiClient.accessToken() + '"';
    }

    // ── Load ────────────────────────────────────────────────────────
    function loadConfig() {
        fetch('/Plugins/' + PLUGIN_ID + '/Configuration', {
            headers: { 'Authorization': authHeader() }
        })
        .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(function (c) {
            // Plain checkboxes: .checked works perfectly, no shadow DOM issues
            document.getElementById('chkEnableLetterboxd').checked = (c.EnableLetterboxdRatings !== false);
            document.getElementById('chkEnableImdb').checked       = (c.EnableImdbTvRatings !== false);
            document.getElementById('chkShowBadge').checked        = (c.ShowRatingBadge !== false);
            document.getElementById('chkShowOnCards').checked      = (c.ShowRatingOnCards === true);
            document.getElementById('numCacheDuration').value      = c.CacheDurationHours || 24;
            document.getElementById('txtOmdbApiKey').value         = c.OmdbApiKey || '';
            console.log('[ExternalRatings] Loaded:', c);
        })
        .catch(function (e) {
            console.error('[ExternalRatings] Load error:', e);
            showStatus('Failed to load settings: ' + e.message, true);
        });
    }

    // ── Save ────────────────────────────────────────────────────────
    function saveConfig() {
        var btn = document.getElementById('btnSave');
        btn.disabled = true;

        var cfg = {
            EnableLetterboxdRatings: document.getElementById('chkEnableLetterboxd').checked,
            EnableImdbTvRatings:     document.getElementById('chkEnableImdb').checked,
            ShowRatingBadge:         document.getElementById('chkShowBadge').checked,
            ShowRatingOnCards:       document.getElementById('chkShowOnCards').checked,
            CacheDurationHours:      parseInt(document.getElementById('numCacheDuration').value, 10) || 24,
            OmdbApiKey:              document.getElementById('txtOmdbApiKey').value.trim()
        };

        console.log('[ExternalRatings] Saving:', cfg);

        fetch('/Plugins/' + PLUGIN_ID + '/Configuration', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': authHeader()
            },
            body: JSON.stringify(cfg)
        })
        .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            showStatus('✓ Settings saved!', false);
            console.log('[ExternalRatings] Saved OK');
        })
        .catch(function (e) {
            console.error('[ExternalRatings] Save error:', e);
            showStatus('✗ Save failed: ' + e.message, true);
        })
        .then(function () {
            btn.disabled = false;
        });
    }

    // ── Buttons ─────────────────────────────────────────────────────
    document.getElementById('btnSave').addEventListener('click', saveConfig);

    document.getElementById('btnClearCache').addEventListener('click', function () {
        if (!confirm('Clear all cached ratings?')) return;
        fetch('/ExternalRatings/cache', {
            method: 'DELETE',
            headers: { 'Authorization': authHeader() }
        })
        .then(function (r) {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            showStatus('✓ Cache cleared.', false);
        })
        .catch(function (e) {
            showStatus('✗ Clear cache failed: ' + e.message, true);
        });
    });

    // ── Init ─────────────────────────────────────────────────────────
    var page = document.getElementById('ExternalRatingsConfigPage');
    if (page) {
        page.addEventListener('pageshow', loadConfig);
    }
    setTimeout(loadConfig, 200);

})();
</script>
</body>
</html>
